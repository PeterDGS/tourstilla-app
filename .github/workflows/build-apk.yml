Paso 4: Crear el archivo de workflow en GitHub
Ve a: https://github.com/PeterDGS/tourstilla-app

Haz clic en "Add file" → "Create new file"

En el nombre del archivo escribe: .github/workflows/build-apk.yml

Copia y pega este contenido:

name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build APK
        working-directory: frontend
        run: eas build --platform android --profile prev
